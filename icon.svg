<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="55%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <clipPath id="roundClip">
      <rect width="100" height="100" rx="24"/>
    </clipPath>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="24" fill="url(#bg)"/>
  <!-- Sheen overlay top half -->
  <rect width="100" height="100" rx="24" fill="url(#sheen)" clip-path="url(#roundClip)"/>
  <!-- Subtle inner border -->
  <rect width="100" height="100" rx="24" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- ── Receipt document (lower-left, background layer) ── -->
  <!-- Receipt body -->
  <rect x="8" y="60" width="36" height="33" rx="3" fill="rgba(255,255,255,0.14)"/>
  <!-- Serrated / torn top edge -->
  <path d="M8,60 L11,54.5 L14,60 L17,54.5 L20,60 L23,54.5 L26,60 L29,54.5 L32,60 L35,54.5 L38,60 L41,54.5 L44,54.5 L44,60 Z"
        fill="rgba(255,255,255,0.14)"/>
  <!-- Receipt line items -->
  <rect x="13" y="66"  width="24" height="2"   rx="1" fill="rgba(255,255,255,0.55)"/>
  <rect x="13" y="71"  width="16" height="1.8" rx="0.9" fill="rgba(255,255,255,0.35)"/>
  <rect x="13" y="76"  width="20" height="1.8" rx="0.9" fill="rgba(255,255,255,0.35)"/>
  <!-- Dashed divider -->
  <line x1="13" y1="80.5" x2="39" y2="80.5" stroke="rgba(255,255,255,0.25)" stroke-width="0.8" stroke-dasharray="2.5,2"/>
  <!-- Total line -->
  <rect x="13" y="84"  width="24" height="2"   rx="1" fill="rgba(255,255,255,0.55)"/>
  <!-- Small dollar mark -->
  <text x="32.5" y="84.5" font-family="sans-serif" font-size="6" font-weight="700"
        fill="rgba(255,255,255,0.35)" text-anchor="middle">$</text>

  <!-- ── Commercial Airplane (top-down view, -40° = pointing upper-right) ── -->
  <g transform="rotate(-40, 50, 50)" fill="white" filter="url(#glow)">

    <!-- Fuselage: smooth tapered body -->
    <path d="M88,50
             C88,46.5 76,43.5 60,43.5
             Q40,43 22,45
             L22,55
             Q40,57 60,56.5
             C76,56.5 88,53.5 88,50 Z"/>

    <!-- Upper main wing (swept, tapered) -->
    <path d="M54,43.5 C56,36 59,24 62,15 L71,43.5 Z"/>
    <!-- Lower main wing (mirror) -->
    <path d="M54,56.5 C56,64 59,76 62,85 L71,56.5 Z"/>

    <!-- Engine nacelle — upper wing -->
    <ellipse cx="61" cy="27" rx="6" ry="2.2" opacity="0.88"/>
    <!-- Engine nacelle — lower wing -->
    <ellipse cx="61" cy="73" rx="6" ry="2.2" opacity="0.88"/>

    <!-- Horizontal stabilizer — upper -->
    <path d="M27,45.5 C25,42 21,39 15,37 L23,45.5 Z" opacity="0.82"/>
    <!-- Horizontal stabilizer — lower -->
    <path d="M27,54.5 C25,58 21,61 15,63 L23,54.5 Z" opacity="0.82"/>

    <!-- Subtle window row -->
    <circle cx="70" cy="48.5" r="1.2" fill="rgba(180,200,255,0.5)"/>
    <circle cx="65" cy="48.5" r="1.2" fill="rgba(180,200,255,0.5)"/>
    <circle cx="60" cy="48.5" r="1.2" fill="rgba(180,200,255,0.5)"/>
    <circle cx="55" cy="48.5" r="1.2" fill="rgba(180,200,255,0.5)"/>
    <circle cx="50" cy="48.5" r="1.2" fill="rgba(180,200,255,0.4)"/>
    <circle cx="45" cy="48.5" r="1.2" fill="rgba(180,200,255,0.3)"/>
  </g>

  <!-- ── Contrail sparkle dots (upper-right, after nose) ── -->
  <circle cx="76" cy="16" r="2"   fill="rgba(255,255,255,0.35)"/>
  <circle cx="83" cy="22" r="1.4" fill="rgba(255,255,255,0.25)"/>
  <circle cx="88" cy="14" r="1"   fill="rgba(255,255,255,0.18)"/>
</svg>
